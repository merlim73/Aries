<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorte Áries 1973 - Edição VIP</title>
    <style>
        :root { --vermelho: #d32f2f; --branco: #ffffff; --verde: #2d5a27; --dourado: #ffc107; --azul: #1976d2; }
        body { background-color: var(--vermelho); color: var(--branco); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; text-align: center; }
        .container { background: var(--branco); color: #333; max-width: 850px; margin: auto; border-radius: 25px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        
        .header { border-bottom: 4px solid var(--vermelho); margin-bottom: 10px; }
        .quote { font-style: italic; font-weight: bold; color: var(--vermelho); font-size: 1.3em; margin: 10px 0; text-transform: uppercase; }
        .trevos { font-size: 24px; margin: 10px 0; letter-spacing: 5px; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f4f4f4; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ccc; font-size: 16px; font-weight: bold; }
        button { background: var(--verde); color: white; border: none; cursor: pointer; grid-column: 1 / -1; font-size: 22px; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #1b3d1a; }

        .result-box { background: #fff; padding: 30px; border-radius: 15px; margin-top: 20px; border: 3px solid #eee; box-shadow: inset 0 0 15px rgba(0,0,0,0.05); }
        .ball-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .ball { width: 45px; height: 45px; line-height: 45px; border-radius: 50%; background: #fff; border: 2px solid var(--vermelho); color: var(--vermelho); font-weight: bold; font-size: 1.3em; }
        .extra-ball { width: 45px; height: 45px; line-height: 45px; border-radius: 50%; color: #333; font-weight: bold; font-size: 1.3em; border: 2px solid #999; }
        .star-style { background: var(--dourado); border-color: #b8860b; }
        .lucky-style { background: var(--azul); border-color: #0d47a1; color: white; }

        .price-tag { font-size: 1.8em; color: var(--verde); font-weight: 900; margin-top: 15px; border-top: 2px solid #eee; padding-top: 15px; }

        /* VIDEO FIX */
        .video-box { margin-top: 40px; border-top: 4px solid var(--vermelho); padding-top: 20px; }
        .iframe-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; background: #000; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .data-viva { color: var(--vermelho); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 45px;">♈ ÁRIES VIP</h1>
        <p style="margin:5px 0; font-weight: bold; font-size: 1.1em;">SORTE PARA 09 DE ABRIL DE 1973</p>
        <p class="quote">"A Sorte acompanha os Audazes"</p>
    </div>

    <div class="trevos">🍀🍀🍀🍀🍀🍀🍀🍀🍀🍀🍀🍀🍀</div>

    <div class="controls">
        <div>
            <label>JOGO</label>
            <select id="game" onchange="updateOptions()">
                <option value="euro">Euromilhões</option>
                <option value="toto">Totoloto</option>
            </select>
        </div>
        <div>
            <label>NÚMEROS</label>
            <select id="nQty"></select>
        </div>
        <div>
            <label id="extraTitle">ESTRELAS</label>
            <select id="eQty"></select>
        </div>
        <button onclick="gerarAlgoritmo()">GERAR JOGOS PREVISÍVEIS</button>
    </div>

    <div id="output" class="result-box" style="display:none;">
        <div class="ball-row" id="ballDisplay"></div>
        <div class="price-tag">CUSTO: <span id="priceDisplay"></span></div>
    </div>

    <div class="video-box">
        <h2 style="color: var(--vermelho);">🔮 PREVISÃO MÁRCIA SENSITIVA</h2>
        <div class="data-viva" id="hoje-data"></div>
        <div class="iframe-container">
            <iframe id="video-frame" src="https://www.youtube.com/embed/I_1shpP3THE" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <p style="color:#666; font-size: 12px; margin-top: 10px;">O vídeo acima é a atualização mais recente das previsões de 2026.</p>
    </div>
</div>

<script>
// --- LOGICA DOS JOGOS ---
const prices = {
    euro: { '5-2': 2.5, '5-3': 7.5, '5-4': 15, '5-5': 25, '5-6': 37.5, '6-2': 15, '6-3': 45, '6-4': 90, '6-5': 150, '7-2': 52.5, '7-3': 157.5, '7-4': 315, '8-2': 140, '8-3': 420, '9-2': 315, '9-3': 945, '10-2': 630, '11-2': 1155, '12-2': 1980 },
    toto_base: { '5': 1, '6': 6, '7': 21, '8': 56, '9': 126, '10': 252, '11': 462, '12': 792, '13': 1287 }
};

function updateOptions() {
    const game = document.getElementById('game').value;
    const nSel = document.getElementById('nQty');
    const eSel = document.getElementById('eQty');
    const extraTitle = document.getElementById('extraTitle');
    nSel.innerHTML = ''; eSel.innerHTML = '';

    if(game === 'euro') {
        for(let i=5; i<=12; i++) nSel.options.add(new Option(i + " Números", i));
        for(let i=2; i<=6; i++) eSel.options.add(new Option(i + " Estrelas", i));
        extraTitle.innerText = "ESTRELAS";
    } else {
        for(let i=5; i<=13; i++) nSel.options.add(new Option(i + " Números", i));
        for(let i=1; i<=13; i++) eSel.options.add(new Option(i + " Sorte", i));
        extraTitle.innerText = "Nº SORTE";
    }
}

function gerarAlgoritmo() {
    const game = document.getElementById('game').value;
    const nQty = parseInt(document.getElementById('nQty').value);
    const eQty = parseInt(document.getElementById('eQty').value);
    const display = document.getElementById('ballDisplay');
    display.innerHTML = '';
    
    let nums = [];
    let maxNum = (game === 'euro') ? 50 : 49;
    while(nums.length < nQty) {
        let r = Math.floor(Math.random() * maxNum) + 1;
        if(!nums.includes(r)) nums.push(r);
    }
    nums.sort((a, b) => a - b).forEach(n => {
        display.innerHTML += `<div class="ball">${n}</div>`;
    });
    
    let extras = [];
    let maxExtra = (game === 'euro') ? 12 : 13;
    let extraClass = (game === 'euro') ? 'star-style' : 'lucky-style';
    while(extras.length < eQty) {
        let r = Math.floor(Math.random() * maxExtra) + 1;
        if(!extras.includes(r)) extras.push(r);
    }
    extras.sort((a, b) => a - b).forEach(e => {
        display.innerHTML += `<div class="extra-ball ${extraClass}">${e}</div>`;
    });

    let preco = (game === 'euro') ? prices.euro[`${nQty}-${eQty}`] : prices.toto_base[nQty] * eQty;
    document.getElementById('priceDisplay').innerText = preco.toFixed(2) + "€";
    document.getElementById('output').style.display = 'block';
}

// --- CONFIGURAÇÃO DE DATA ---
const d = new Date();
document.getElementById('hoje-data').innerText = d.toLocaleDateString('pt-PT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

updateOptions();
</script>
</body>
</html>
